  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t-transform: uppercase; letter-spacing: 0.12em;\n    color: var(--brand-700);\n  }\n\n  /* ───────── Cover ───────── */\n  .cover { margin-bottom: 96px; }\n  .cover .meta-row {\n    display: flex; align-items: center; gap: 14px;\n    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;\n    color: var(--ink-400);\n    margin-bottom: 32px;\n  }\n  .cover .meta-row .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--ink-300); }\n  .cover h1 {\n    font-family: var(--font-display); font-weight: 500;\n    font-size: 116px; line-height: 0.98; letter-spacing: -0.035em;\n    margin: 0 0 24px;\n    color: var(--ink-900);\n    font-optical-sizing: auto;\n  }\n  .cover h1 em {\n    font-style: italic; font-weight: 400;\n    color: var(--brand-700);\n  }\n  .cover .lede {\n    max-width: 620px;\n    font-size: 18px; line-height: 1.55;\n    color: var(--ink-600);\n    margin-bottom: 48px;\n  }\n  .cover .summary {\n    display: grid; grid-template-columns: repeat(4, 1fr);\n    border-top: 1px solid var(--ink-200);\n    padding-top: 24px;\n  }\n  .cover .summary > div { padding-right: 16px; }\n  .cover .summary .label {\n    font-size: 10.5px; font-weight: 600; text-transform: uppercase;\n    letter-spacing: 0.12em; color: var(--ink-400);\n    margin-bottom: 8px;\n  }\n  .cover .summary .value {\n    font-family: var(--font-display); font-weight: 500;\n    font-size: 22px; letter-spacing: -0.02em;\n    color: var(--ink-900);\n  }\n  .cover .summary .value small {\n    font-family: var(--font-sans);\n    font-size: 13px; color: var(--ink-500); margin-left: 6px;\n    letter-spacing: 0;\n  }\n\n  /* ───────── Section ───────── */\n  section { margin-bottom: 96px; }\n  .sec-head { margin-bottom: 32px; display: flex; align-items: baseline; gap: 24px; border-bottom: 1px solid var(--ink-200); padding-bottom: 16px; }\n  .sec-head .num {\n    font-family: var(--font-mono);\n    font-size: 11px;\n    color: var(--ink-400);\n    letter-spacing: 0.05em;\n 00); flex: 1; }\n\n  .ramp { display: grid; gap: 6px; }\n  .ramp.r10 { grid-template-columns: repeat(10, 1fr); }\n  .ramp.r5  { grid-template-columns: repeat(5, 1fr); }\n  .ramp .swatch {\n    border-radius: 8px;\n    aspect-ratio: 1 / 1.05;\n    padding: 10px;\n    display: flex; flex-direction: column; justify-content: space-between;\n    border: 1px solid rgba(26,24,20,0.05);\n    position: relative;\n  }\n  .ramp .swatch .name {\n    font-size: 10.5px; font-weight: 600;\n    letter-spacing: 0.04em;\n  }\n  .ramp .swatch .hex {\n    font-family: var(--font-mono);\n    font-size: 10px;\n    opacity: 0.85;\n  }\n  .ramp .swatch.light { color: var(--ink-700); }\n  .ramp .swatch.dark { color: white; }\n\n  /* Surface swatches */\n  .surfaces { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }\n  .surface {\n    border-radius: 12px;\n    height: 132px;\n    border: 1px solid rgba(228,223,210,0.8);\n    padding: 18px;\n    position: relative;\n    display: flex; flex-direction: column; justify-content: space-between;\n  }\n  .surface .name { font-size: 12.5px; font-weight: 600; color: var(--ink-800); }\n  .surface .hex { font-family: var(--font-mono); font-size: 11px; color: var(--ink-500); }\n  .surface .role { font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-400); }\n\n  /* ───────── Typography ───────── */\n  .type-rows { display: flex; flex-direction: column; }\n  .type-row {\n    display: grid; grid-template-columns: 130px 1fr 200px;\n    gap: 24px;\n    padding: 24px 0;\n    border-top: 1px solid var(--ink-200);\n    align-items: baseline;\n  }\n  .type-row:first-child { border-top: none; }\n  .type-row .tag {\n    font-family: var(--font-mono); font-size: 10.5px;\n    color: var(--ink-500);\n    letter-spacing: 0.04em;\n    padding-top: 4px;\n  }\n  .type-row .specimen { color: var(--ink-900); }\n  .type-row .specs {\n    font-family: var(--font-mono); font-size: 11px; color: var(--ink-400);\n    letter-spacing: 0.02em;\n    text-align: right;\n    padding-top: 4px;\n  }\n\n  .type-pairing {\n    background: white;\n    border: 1px solid rgba(228,223,210,0.8);\n    border-radius: 12px;\n    padding: 48px;\n    margin-top: 24px;\n    display: grid; grid-template-columns: 1.6fr 1fr; gap: 56px;\n    align-items: center;\n  }\n  .type-pairing .big {\n    font-family: var(--font-display); font-weight: 500;\n    font-size: 80px; line-height: 0.96; letter-spacing: -0.03em;\n    color: var(--ink-900);\n    font-optical-sizing: auto;\n  }\n  .type-pairing .big em { font-style: italic; color: var(--brand-700); font-weight: 400; }\n  .type-pairing .note { color: var(--ink-500); font-size: 13.5px; line-height: 1.6; }\n  .type-pairing .note p { margin: 0 0 12px; }\n  .type-pairing .note .ledger {\n    margin-top: 18px;\n    font-family: var(--font-mono);\n    font-size: 12px;\n    background: var(--canvas);\n    border-radius: 8px;\n    padding: 14px 16px;\n    color: var(--ink-700);\n    border: 1px solid var(--ink-200);\n  }\n  .type-pairing .note .ledger .row {\n    display: flex; justify-content: space-between;\n    padding: 4px 0;\n  }\n  .type-pairing .note .ledger .row.total {\n    border-top: 1px solid var(--ink-200);\n    margin-top: 6px; padding-top: 8px;\n    color: var(--ink-900);\n    font-weight: 500;\n  }\n\n  /* ───────── Components ───────── */\n  .panel {\n    background: white;\n    border: 1px solid rgba(228,223,210,0.8);\n    border-radius: 12px;\n    padding: 32px;\n    position: relative;\n  }\n  .panel.tinted { background: var(--canvas-soft); }\n  .panel + .panel { margin-top: 16px; }\n  .panel .panel-head {\n    display: flex; justify-content: space-between; align-items: baseline;\n    margin-bottom: 24px;\n  }\n  .panel .panel-head h4 {\n    font-family: var(--font-display); font-weight: 500;\n    font-size: 18px; letter-spacing: -0.015em; margin: 0;\n    color: var(--ink-900);\n  }\n  .panel .panel-head .pname { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-400); letter-spacing: 0.05em; }\n\n  /* Buttons */\n  .btn {\n    display: inline-flex; align-items: center; justify-content: center;\n    gap: 6px;\n    border-radius: 8px;\n    font-size: 13px; font-weight: 500;\n    font-family: var(--font-sans);\n    transition: all 150ms;\n    height: 36px; padding: 0 16px;\n    border: 0; cursor: pointer;\n  }\n  .btn.sm { height: 28px; padding: 0 10px; font-size: 12px; }\n  .btn.lg { height: 40px; padding: 0 20px; }\n  .btn.icon { width: 36px; height: 36px; padding: 0; }\n  .btn.brand {\n    background: var(--brand-700); color: white;\n    box-shadow: 0 1px 2px rgba(4,120,87,0.15);\n    box-shadow: 0 1px 2px rgba(4,120,87,0.15), inset 0 0 0 1px rgba(6,95,70,0.2);\n  }\n  .btn.default {\n    background: var(--ink-900); color: white;\n    box-shadow: 0 1px 2px rgba(26,24,20,0.15);\n  }\n  .btn.secondary {\n    background: white; color: var(--ink-900);\n    box-shadow: 0 1px 2px rgba(26,24,20,0.04), inset 0 0 0 1px rgba(228,223,210,0.8);\n  }\n  .btn.outline {\n    background: rgba(255,255,255,0.8);\n    color: var(--ink-800);\n    border: 1px solid rgba(201,194,177,0.8);\n  }\n  .btn.ghost { background: transparent; color: var(--ink-600); }\n  .btn.danger {\n    background: var(--rose-700); color: white;\n    box-shadow: 0 1px 2px rgba(190,18,60,0.15);\n  }\n\n  .btn-grid {\n    display: grid; grid-template-columns: 130px repeat(4, 1fr);\n    gap: 16px; align-items: center;\n  }\n  .btn-grid .lh {\n    font-family: var(--font-mono); font-size: 10.5px;\n    color: var(--ink-500); letter-spacing: 0.04em;\n  }\n  .btn-grid .ch { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-400); letter-spacing: 0.04em; text-align: center; padding-bottom: 6px; border-bottom: 1px solid var(--ink-200); }\n  .btn-cell { display: flex; justify-content: center; align-items: center; padding: 8px 0; }\n\n  /* Badges */\n  .badge {\n    display: inline-flex; align-items: center; gap: 6px;\n    padding: 2px 8px;\n    border-radius: 6px;\n    font-size: 10.5px; font-weight: 500;\n    box-shadow: inset 0 0 0 1px var(--ring, rgba(228,223,210,0.8));\n  }\n  .badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--dot, var(--ink-400)); }\n  .badge.booked   { background: var(--ink-100); color: var(--ink-700); --ring: rgba(228,223,210,0.8); --dot: var(--ink-400); }\n  .badge.advanced { background: var(--sky-50); color: var(--sky-800); --ring: rgba(191,219,254,0.8); --dot: var(--sky-700); }\n  .badge.day_of   { background: var(--amber-50); color: var(--amber-800); --ring: rgba(253,230,138,0.8); --dot: var(--amber-700); }\n  .badge.settled  { background: var(--brand-50); color: var(--brand-800); --ring: rgba(167,243,208,0.8); --dot: var(--brand-700); }\n  .badge.closed   { background: var(--ink-50); color: var(--ink-500); --ring: rgba(228,223,210,0.8); --dot: var(--ink-400); }\n  .badge.flat     { background: var(--ink-50); color: var(--ink-700); --ring: rgba(228,223,210,0.8); }\n  .badge.vs       { background: var(--amber-50); color: var(--amber-800); --ring: rgba(253,230,138,0.8); }\n  .badge.door     { background: var(--rose-50); color: var(--rose-800); --ring: rgba(254,202,202,0.8); }\n  .badge.amber    { background: var(--amber-50); color: var(--amber-800); --ring: rgba(253,230,138,0.8); }\n  .badge.brand    { background: var(--brand-50); color: var(--brand-800); --ring: rgba(167,243,208,0.8); }\n  .badge.rose     { background: var(--rose-50); color: var(--rose-800); --ring: rgba(254,202,202,0.8); }\n  .badge.sky      { background: var(--sky-50); color: var(--sky-800); --ring: rgba(191,219,254,0.8); }\n\n  .badge-row {\n    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;\n  }\n  .badge-label {\n    font-family: var(--font-mono); font-size: 10.5px;\n    color: var(--ink-500); letter-spacing: 0.04em;\n    width: 130px; flex-shrink: 0;\n  }\n\n  /* Cards (UI primitive) */\n  .ui-card {\n    position: relative;\n    background: white;\n    border: 1px solid rgba(228,223,210,0.8);\n    border-radius: 8px;\n    box-shadow: 0 1px 2px rgba(26,24,20,0.03);\n    overflow: hidden;\n  }\n  .ui-card .accent {\n    position: absolute; top: 0; left: 0; right: 0; height: 2px;\n  }\n  .ui-card .accent.brand { background: linear-gradient(to right, var(--brand-500), var(--brand-700)); }\n  .ui-card .accent.amber { background: linear-gradient(to right, var(--amber-200), var(--amber-700)); }\n  .ui-card .accent.rose  { background: linear-gradient(to right, var(--rose-200), var(--rose-700)); }\n  .ui-card .accent.sky   { background: linear-gradient(to right, var(--sky-200), var(--sky-700)); }\n  .ui-card .uc-head {\n    padding: 16px 20px;\n    border-bottom: 1px solid rgba(243,240,233,0.8);\n    display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;\n  }\n  .ui-card .uc-title { font-size: 13px; font-weight: 600; color: var(--ink-900); letter-spacing: -0.005em; }\n  .ui-card .uc-desc { font-size: 12px; color: var(--ink-500); margin-top: 2px; line-height: 1.5; }\n  .ui-card .uc-body { padding: 16px 20px; }\n  .ui-card .uc-foot { padding: 12px 20px; border-top: 1px solid rgba(243,240,233,0.8); font-size: 12px; color: var(--ink-500); }\n\n  .card-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }\n\n  /* Field */\n  .field-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px 32px; }\n  .field .lbl {\n    font-size: 10px; font-weight: 600; text-transform: uppercase;\n    letter-spacing: 0.12em; color: var(--ink-500); margin-bottom: 4px;\n  }\n  .field .val { font-size: 13.5px; color: var(--ink-900); }\n  .field .val.mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }\n\n  /* Settlement hero pattern */\n  .hero-num {\n    background: white;\n    border: 1px solid rgba(228,223,210,0.8);\n    border-radius: 12px;\n    padding: 48px 56px;\n    margin-top: 16px;\n    position: relative;\n    overflow: hidden;\n  }\n  .hero-num .accent {\n    position: absolute; top: 0; left: 0; right: 0; height: 3px;\n    background: linear-gradient(to right, var(--brand-500), var(--brand-700));\n  }\n  .hero-num .eyebrow-pair { display: flex; gap: 18px; align-items: center; }\n  .hero-num .num {\n    font-family: var(--font-display); font-weight: 500;\n    font-size: 96px; line-height: 1; letter-spacing: -0.04em;\n    color: var(--ink-900);\n    margin: 20px 0 12px;\n    font-variant-numeric: tabular-nums;\n    font-optical-sizing: auto;\n  }\n  .hero-num .num .cents { font-size: 48px; color: var(--ink-400); margin-left: 4px; }\n  .hero-num .breakdown {\n    display: grid; grid-template-columns: repeat(4, 1fr);\n    gap: 24px; margin-top: 32px;\n    border-top: 1px solid var(--ink-200);\n    padding-top: 24px;\n  }\n\n  /* Sidebar pattern */\n  .sidebar {\n    width: 248px;\n    background: var(--canvas-soft);\n    border: 1px solid rgba(228,223,210,0.6);\n    border-radius: 12px;\n    padding: 22px 0 12px;\n    display: flex; flex-direction: column;\n    min-height: 460px;\n  }\n  .sidebar .brand-row {\n    display: flex; align-items: center; gap: 10px;\n    padding: 0 20px 20px;\n  }\n  .sidebar .brand-row .name {\n    font-family: var(--font-display); font-weight: 500;\n    font-size: 15px; letter-spacing: -0.02em;\n    line-height: 1;\n  }\n  .sidebar .brand-row .ver {\n    font-size: 9.5px; color: var(--ink-400);\n    text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px;\n  }\n  .sidebar .nav { padding: 0 10px; display: flex; flex-direction: column; gap: 2px; flex: 1; }\n  .sidebar .nav a {\n    display: flex; align-items: center; gap: 10px;\n    padding: 8px 12px;\n    border-radius: 8px;\n    font-size: 13px; color: var(--ink-500);\n    text-decoration: none;\n    transition: all 150ms;\n  }\n  .sidebar .nav a.active {\n    background: white; color: var(--ink-900); font-weight: 500;\n    box-shadow: 0 1px 3px rgba(26,24,20,0.06), inset 0 0 0 1px rgba(228,223,210,0.4);\n  }\n  .sidebar .nav a .icon { width: 16px; height: 16px; color: var(--ink-400); }\n  .sidebar .nav a.active .icon { color: var(--brand-700); }\n  .sidebar .case-card {\n    margin: 0 12px 12px;\n    border: 1px solid rgba(167,243,208,0.4);\n    background: rgba(236,253,245,0.3);\n    border-radius: 8px;\n    padding: 12px;\n    font-size: 11px; line-height: 1.4; color: var(--ink-500);\n  }\n  .sidebar .case-card .label {\n    font-size: 9.5px; font-weight: 600; text-transform: uppercase;\n    letter-spacing: 0.1em; color: var(--brand-800);\n    margin-bottom: 6px;\n  }\n  .sidebar .case-card a { color: var(--brand-700); text-decoration: none; font-weight: 500; }\n  .sidebar .user {\n    border-top: 1px solid rgba(228,223,210,0.6);\n    padding: 12px 16px 0;\n    display: flex; align-items: center; gap: 10px;\n  }\n  .sidebar .user .av {\n    width: 28px; height: 28px; border-radius: 50%;\n    background: linear-gradient(135deg, var(--ink-600), var(--ink-900));\n    color: white; display: flex; align-items: center; justify-content: center;\n    font-size: 10px; font-weight: 500;\n  }\n  .sidebar .user .nm { font-size: 12px; font-weight: 500; color: var(--ink-900); line-height: 1.2; }\n  .sidebar .user .role { font-size: 10px; color: var(--ink-400); }\n\n  /* Command palette */\n  .cmd {\n    background: white;\n    border-radius: 10px;\n    box-shadow: 0 24px 48px rgba(26,24,20,0.1), inset 0 0 0 1px rgba(228,223,210,0.6);\n    overflow: hidden;\n    width: 480px;\n  }\n  .cmd .input {\n    display: flex; align-items: center; gap: 12px;\n    padding: 0 16px;\n    border-bottom: 1px solid rgba(228,223,210,0.6);\n    height: 48px;\n  }\n  .cmd .input .icon { width: 16px; height: 16px; color: var(--ink-400); }\n  .cmd .input .placeholder { flex: 1; color: var(--ink-400); font-size: 14px; }\n  .cmd .kbd {\n    font-family: var(--font-mono);\n    background: var(--ink-100);\n    border: 1px solid rgba(228,223,210,0.6);\n    border-radius: 4px;\n    padding: 1px 6px;\n    font-size: 10px; color: var(--ink-500); font-weight: 500;\n  }\n  .cmd .group-title {\n    padding: 8px 12px 4px;\n    font-size: 10.5px; font-weight: 600; text-transform: uppercase;\n    letter-spacing: 0.1em; color: var(--ink-400);\n  }\n  .cmd .item {\n    display: flex; align-items: center; gap: 12px;\n    padding: 8px 12px;\n    margin: 0 8px;\n    border-radius: 6px;\n    font-size: 13px;\n  }\n  .cmd .item.active { background: var(--brand-50); }\n  .cmd .item .icon { width: 16px; height: 16px; color: var(--ink-400); flex-shrink: 0; }\n  .cmd .item.active .icon { color: var(--brand-700); }\n  .cmd .item .pri { font-weight: 500; color: var(--ink-900); font-size: 14px; }\n  .cmd .item .sec { font-size: 12px; color: var(--ink-400); }\n  .cmd .item.active .arrow { color: var(--brand-700); margin-left: auto; }\n  .cmd .foot {\n    border-top: 1px solid rgba(228,223,210,0.6);\n    padding: 8px 16px;\n    display: flex; gap: 14px;\n    font-size: 11px; color: var(--ink-400);\n  }\n  .cmd .foot .kbd { font-size: 9px; padding: 0 4px; height: 16px; display: inline-flex; align-items: center; justify-content: center; line-height: 1; }\n  .cmd .foot span { display: inline-flex; align-items: center; gap: 4px; }\n\n  /* Tooltip */\n  .tooltip-demo {\n    display: inline-block;\n    position: relative;\n  }\n  .tooltip-bubble {\n    position: relative;\n    background: var(--ink-900); color: white;\n    font-size: 11.5px; line-height: 1.55;\n    padding: 6px 10px;\n    border-radius: 6px;\n    box-shadow: 0 10px 20px rgba(26,24,20,0.15);\n    max-width: 240px;\n    display: inline-block;\n  }\n  .tooltip-bubble::after {\n    content: '';\n    position: absolute;\n    top: 100%; left: 50%;\n    transform: translateX(-50%);\n    width: 0; height: 0;\n    border: 5px solid transparent;\n    border-top-color: var(--ink-900);\n  }\n\n  /* Status accent dots (shows list edge) */\n  .row-list .row {\n    display: grid; grid-template-columns: 4px 1fr auto auto auto;\n    gap: 14px; align-items: center;\n    background: white;\n    border: 1px solid rgba(228,223,210,0.7);\n    border-radius: 8px;\n    padding: 12px 16px 12px 0;\n    margin-bottom: 6px;\n    position: relative;\n    overflow: hidden;\n  }\n  .row-list .row .stripe { height: 100%; width: 4px; align-self: stretch; }\n  .row-list .row .a { font-size: 14px; font-weight: 500; color: var(--ink-900); }\n  .row-list .row .d { font-size: 12px; color: var(--ink-500); }\n  .row-list .row .v { font-family: var(--font-mono); font-size: 13px; color: var(--ink-900); font-variant-numeric: tabular-nums; }\n\n  /* Iconography */\n  .icon-grid {\n    display: grid; grid-template-columns: repeat(8, 1fr);\n    gap: 8px;\n  }\n  .icon-tile {\n    aspect-ratio: 1;\n    background: white;\n    border: 1px solid rgba(228,223,210,0.7);\n    border-radius: 8px;\n    display: flex; flex-direction: column; align-items: center; justify-content: center;\n    gap: 6px;\n    color: var(--ink-700);\n    padding: 4px;\n  }\n  .icon-tile span {\n    font-family: var(--font-mono);\n    font-size: 9px;\n    color: var(--ink-400);\n  }\n\n  /* Radii + shadows */\n  .scale-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }\n  .scale-tile {\n    background: white;\n    border: 1px solid rgba(228,223,210,0.7);\n    aspect-ratio: 1;\n    display: flex; flex-direction: column; align-items: center; justify-content: center;\n    text-align: center;\n    padding: 8px;\n  }\n  .scale-tile .v { font-family: var(--font-mono); font-size: 11px; color: var(--ink-900); margin-top: 6px; }\n  .scale-tile .l { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-500); }\n\n  .shadow-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }\n  .shadow-tile {\n    background: white;\n    border-radius: 10px;\n    aspect-ratio: 1.6/1;\n    padding: 14px;\n    display: flex; flex-direction: column; justify-content: space-between;\n  }\n  .shadow-tile .l { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-500); }\n  .shadow-tile .v { font-family: var(--font-mono); font-size: 9.5px; color: var(--ink-400); line-height: 1.4; }\n  .shadow-tile.s1 { box-shadow: 0 1px 2px rgba(26,24,20,0.03); border: 1px solid rgba(228,223,210,0.8); }\n  .shadow-tile.s2 { box-shadow: 0 1px 3px rgba(26,24,20,0.06); border: 1px solid rgba(228,223,210,0.4); }\n  .shadow-tile.s3 { box-shadow: 0 10px 20px rgba(26,24,20,0.08); }\n  .shadow-tile.s4 { box-shadow: 0 24px 48px rgba(26,24,20,0.10); }\n\n  /* Voice & tone */\n  .voice {\n    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;\n  }\n  .voice .col {\n    background: white;\n    border: 1px solid rgba(228,223,210,0.7);\n    border-radius: 10px;\n    padding: 24px;\n  }\n  .voice .col h4 {\n    font-family: var(--font-mono); font-size: 11px; font-weight: 500;\n    text-transform: uppercase; letter-spacing: 0.12em;\n    margin: 0 0 16px;\n  }\n  .voice .col.do h4 { color: var(--brand-700); }\n  .voice .col.dont h4 { color: var(--rose-700); }\n  .voice .col ul { margin: 0; padding: 0; list-style: none; }\n  .voice .col li {\n    padding: 10px 0;\n    border-top: 1px solid var(--ink-100);\n    font-size: 13.5px; line-height: 1.5;\n    color: var(--ink-700);\n  }\n  .voice .col li:first-child { border-top: 0; }\n  .voice .col li b { font-family: var(--font-display); font-weight: 500; color: var(--ink-900); font-size: 14.5px; letter-spacing: -0.01em; }\n\n  /* Foot */\n  .colophon {\n    margin-top: 80px;\n    padding-top: 32px;\n    border-top: 1px solid var(--ink-200);\n    display: flex; justify-content: space-between;\n    font-size: 11.5px; color: var(--ink-400);\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"page\">\n\n  <!-- ───────── COVER ───────── -->\n  <header class=\"cover\">\n    <div class=\"meta-row\">\n      <span style=\"display:inline-flex;align-items:center;gap:8px\">\n        <!-- mini mark -->\n        <svg width=\"20\" height=\"20\" viewBox=\"0 0 40 40\">\n          <defs><linearGradient id=\"gm\" x1=\"0\" y1=\"0\" x2=\"40\" y2=\"40\" gradientUnits=\"userSpaceOnUse\"><stop offset=\"0\" stop-color=\"#059669\"><\u002Fstop><stop offset=\"1\" stop-color=\"#047857\"><\u002Fstop><\u002FlinearGradient><\u002Fdefs>\n          <rect width=\"40\" height=\"40\" rx=\"8\" fill=\"url(#gm)\"><\u002Frect>\n          <rect x=\"7.5\" y=\"14.5\" width=\"4\" height=\"11\" rx=\"2\" fill=\"white\"><\u002Frect>\n          <rect x=\"14.5\" y=\"11\" width=\"4\" height=\"18\" rx=\"2\" fill=\"white\"><\u002Frect>\n          <rect x=\"21.5\" y=\"9\" width=\"4\" height=\"22\" rx=\"2\" fill=\"white\"><\u002Frect>\n          <rect x=\"28.5\" y=\"16.5\" width=\"4\" height=\"7\" rx=\"2\" fill=\"white\"><\u002Frect>\n        <\u002Fsvg>\n        Greenroom\n      <\u002Fspan>\n      <span class=\"dot\"><\u002Fspan>\n      <span>Design system · v3.4<\u002Fspan>\n      <span class=\"dot\"><\u002Fspan>\n      <span>The Crescent, Nashville<\u002Fspan>\n    <\u002Fdiv>\n\n    <h1>The operating<br>system for <em>independent<\u002Fem><br>music venues.<\u002Fh1>\n\n    <p class=\"lede\">A working library of the marks, type, color, and components that quietly run booking, advancing and settlement at venues like The Crescent. Built like paper. Reads like a ledger. Behaves like software.<\u002Fp>\n\n    <div class=\"summary\">\n      <div>\n        <div class=\"label\">Surface<\u002Fdiv>\n        <div class=\"value\">Paper<small>warm cream canvas<\u002Fsmall><\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"label\">Brand<\u002Fdiv>\n        <div class=\"value\">Emerald<small>brand-700 primary<\u002Fsmall><\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"label\">Type<\u002Fdiv>\n        <div class=\"value\">Fraunces<small>+ Geist sans/mono<\u002Fsmall><\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"label\">Vibe<\u002Fdiv>\n        <div class=\"value\">Posters<small>meet 5/15\"<\u002Fb> — the structure, the split, in the shorthand bookers actually use.<\u002Fli>\n          <li><b>\"Doors 7:30 · set 8:45\"<\u002Fb> — venue time, not 19:30.<\u002Fli>\n          <li><b>\"612 sold, sold out at door\"<\u002Fb> — the truth in two clauses.<\u002Fli>\n          <li><b>\"Mariana edited from notes_freetext\"<\u002Fb> — say what happened, including the warts.<\u002Fli>\n          <li><b>$11,432.<span style=\"color:var(--ink-400)\">50<\u002Fspan><\u002Fb> — money in Geist Mono, cents always.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"col dont\">\n        <h4>✕ Don't<\u002Fh4>\n        <ul>\n          <li><b>\"Process payout reconciliation\"<\u002Fb> — corporate. Say \"settle the show.\"<\u002Fli>\n          <li><b>\"Pending finalization\"<\u002Fb> — vague. Say what's missing.<\u002Fli>\n          <li><b>\"Versus type, percentage based\"<\u002Fb> — bookers read \"Vs deal\" faster.<\u002Fli>\n          <li><b>\"19:30 hours, set start\"<\u002Fb> — military. Bookers run on AM/PM.<\u002Fli>\n          <li><b>Stock photography of a stage<\u002Fb> — Greenroom shows the data, not the band.<\u002Fli>\n          <li><b>Round numbers without cents<\u002Fb> — settlement money is exact, always.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <div class=\"colophon\">\n    <div>Greenroom · Design system v3.4 · Living document<\u002Fdiv>\n    <div class=\"mono\">canvas #FAF7F0 · brand-700 #047857 · ink-900 #1A1814<\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>"
